<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aboitiz Focaccia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      color: #e8e0d4;
    }

    .container {
      width: 100%;
      max-width: 960px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8a7f72;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #e8e0d4;
      text-align: center;
    }

    .video-wrapper {
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      background: #111;
    }

    video {
      width: 100%;
      display: block;
      max-height: 80vh;
      object-fit: contain;
      background: #000;
    }

    .footer {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #4a4540;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="label">Video</span>
    <h1>Aboitiz &mdash; Focaccia</h1>
    <div class="video-wrapper">
      <video controls autoplay muted loop playsinline>
        <source src="C0036_-_VIDEO_ABOITIZ_FOCCACIA.MP4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>
    </div>
    <span class="footer">Keep both files in the same folder to play</span>
  </div>
</body>
</html>
